<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!-- ════════════════════════════════════════
       SIDEBAR NAVIGATION
  ════════════════════════════════════════ -->
<nav th:fragment="sidebar" class="sidebar">
    <a class="sidebar-brand" href="index.html">
        <i class="bi bi-lightning-charge-fill text-warning me-1"></i>
        Focus<span>Flow</span>
    </a>

    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="dashboard.html" class="nav-link active">
                <i class="bi bi-grid-1x2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a href="tasks.html" class="nav-link">
                <i class="bi bi-check2-square"></i> Tasks
            </a>
        </li>
        <li class="nav-item">
            <a href="pomodoro.html" class="nav-link">
                <i class="bi bi-alarm"></i> Pomodoro
            </a>
        </li>
        <li class="nav-item">
            <a href="analytics.html" class="nav-link">
                <i class="bi bi-bar-chart-line"></i> Analytics
            </a>
        </li>
        <li class="nav-item">
            <a href="settings.html" class="nav-link">
                <i class="bi bi-gear"></i> Settings
            </a>
        </li>
    </ul>

    <!-- User info at bottom -->
    <div sec:authorize="isAuthenticated()" class="position-absolute bottom-0 w-100 p-3 border-top border-secondary">
        <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center flex-shrink-0"
                 style="width:34px;height:34px;font-size:0.85rem;font-weight:600;">
                A
            </div>
            <div class="flex-fill overflow-hidden">
                <div class="text-light small fw-semibold text-truncate" sec:authentication="principal.fullName">Alice Dev</div>
                <div class="text-secondary text-truncate" style="font-size:0.72rem;" sec:authentication="principal.username">alice@example.com</div>
            </div>
            <!-- Logout icon button -->
            <form th:action="@{/logout}" method="POST" class="flex-shrink-0">
                <button type="submit" id="btn-logout" class="btn btn-sm btn-outline-secondary border-0 text-secondary"
                        title="Logout" style="padding:0.3rem 0.45rem;">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
