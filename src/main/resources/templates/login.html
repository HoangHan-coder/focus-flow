<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – FocusFlow</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Center the auth card vertically */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 2.5rem 2rem;
    }

    .auth-logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 0.3rem;
    }

    .auth-logo span {
      color: #58a6ff;
    }

    /* Input override for dark feel */
    .form-control {
      background-color: #0d1117;
      border-color: #30363d;
      color: #c9d1d9;
    }

    .form-control:focus {
      background-color: #0d1117;
      border-color: #58a6ff;
      color: #f0f6fc;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .form-control::placeholder {
      color: #6e7681;
    }

    .divider {
      border-color: #30363d;
      margin: 1.5rem 0;
    }

    .navbar-brand span {
      color: #58a6ff;
    }
  </style>
</head>

<body>

  <!-- ════════════════════════════════════════
       NAVBAR
  ════════════════════════════════════════ -->
  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-lightning-charge-fill text-warning me-1"></i>
        Focus<span>Flow</span>
      </a>
      <div class="d-flex gap-2">
        <a href="login.html" class="btn btn-outline-light btn-sm active">Login</a>
        <a href="register.html" class="btn btn-primary btn-sm">Register</a>
      </div>
    </div>
  </nav>


  <!-- ════════════════════════════════════════
       AUTH WRAPPER
  ════════════════════════════════════════ -->
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Header -->
      <div class="text-center mb-4">
        <div class="auth-logo">
          <i class="bi bi-lightning-charge-fill text-warning"></i>
          Focus<span>Flow</span>
        </div>
        <h1 class="fs-4 fw-semibold mt-3 mb-1">Welcome back</h1>
        <p class="text-secondary small mb-0">Sign in to your account to continue</p>
      </div>

      <!-- ── LOGIN FORM ──
           Fields: email, password
           POST /api/auth/login  (placeholder action)
      -->
      <form id="login-form" th:action="@{/auth/login}" method="POST" novalidate>

        <!-- Email -->
        <div class="mb-3">
          <label for="login-email" class="form-label fw-medium">Email address</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" class="form-control" id="login-email" name="username" placeholder="you@example.com"
              value="alice@example.com" required />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label for="login-password" class="form-label fw-medium">Password</label>
            <a href="#" class="text-decoration-none small" style="color:#58a6ff;">Forgot password?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" class="form-control" id="login-password" name="password" placeholder="••••••••"
              required />
            <!-- Toggle password visibility (minimal JS) -->
            <button class="btn btn-outline-secondary" type="button" id="toggle-password" onclick="
                var p = document.getElementById('login-password');
                p.type = p.type === 'password' ? 'text' : 'password';
              ">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="text-danger" th:if="${error != null}" th:text="${error}"></div>
        </div>

        <!-- Remember Me -->
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="remember-me" name="rememberMe" />
          <label class="form-check-label text-secondary small" for="remember-me">
            Keep me signed in
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" id="btn-login" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <!-- Divider -->
      <hr class="divider" />

      <!-- Register link -->
      <p class="text-center text-secondary small mb-0">
        Don't have an account?
        <a href="register.html" class="text-decoration-none" style="color:#58a6ff;">Create one</a>
      </p>

    </div>
  </div>


  <!-- ════════════════════════════════════════
       FOOTER (minimal)
  ════════════════════════════════════════ -->
  <footer class="py-3 text-center text-secondary small border-top border-secondary">
    &copy; 2026 FocusFlow. All rights reserved.
  </footer>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
