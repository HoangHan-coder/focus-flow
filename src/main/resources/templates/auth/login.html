<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – FocusFlow</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/assets/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link th:href="@{/assets/css/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/assets/css/login-style.css}" rel="stylesheet">
</head>

<body>

<!-- ════════════════════════════════════════
  NAVBAR
════════════════════════════════════════ -->
<nav th:replace="~{fragments/navbar :: nav}"></nav>

<!-- ════════════════════════════════════════
     AUTH WRAPPER
════════════════════════════════════════ -->
<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Header -->
        <div class="text-center mb-4">
            <div class="auth-logo">
                <i class="bi bi-lightning-charge-fill text-warning"></i>
                Focus<span>Flow</span>
            </div>
            <h1 class="fs-4 fw-semibold mt-3 mb-1">Welcome back</h1>
            <p class="text-secondary small mb-0">Sign in to your account to continue</p>
        </div>

        <form id="login-form" th:action="@{/auth/login}" method="POST" novalidate>

            <!-- Email -->
            <div class="mb-3">
                <label for="login-email" class="form-label fw-medium">Email address</label>
                <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary">
              <i class="bi bi-envelope"></i>
            </span>
                    <input type="email" class="form-control" id="login-email" name="email" placeholder="you@example.com"
                           value="alice@example.com" required/>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="login-password" class="form-label fw-medium">Password</label>
                    <a href="#" class="text-decoration-none small" style="color:#58a6ff;">Forgot password?</a>
                </div>
                <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary">
              <i class="bi bi-lock"></i>
            </span>
                    <input type="password" class="form-control" id="login-password" name="password"
                           placeholder="••••••••"
                           required/>
                    <!-- Toggle password visibility (minimal JS) -->
                    <button class="btn btn-outline-secondary" type="button" id="toggle-password" onclick="
                var p = document.getElementById('login-password');
                p.type = p.type === 'password' ? 'text' : 'password';
              ">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="text-danger" th:if="${error != null}" th:text="${error}"></div>
            </div>

            <!-- Submit -->
            <button type="submit" id="btn-login" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <!-- Divider -->
        <hr class="divider"/>

        <!-- Register link -->
        <p class="text-center text-secondary small mb-0">
            Don't have an account?
            <a th:href="@{/auth/registers}" class="text-decoration-none" style="color:#58a6ff;">Create one</a>
        </p>

    </div>
</div>

<!-- ════════════════════════════════════════
    REGISTRATION SUCCESS TOAST
    th:if="${registrationSuccess}" để ẩn/hiện từ Thymeleaf
════════════════════════════════════════ -->
<div id="reg-toast-container" aria-live="polite" aria-atomic="true"
     th:if="${registrationSuccess != null && registrationSuccess}">
    <div id="reg-toast" class="toast show align-items-center" role="alert" data-bs-delay="5000">
        <div class="toast-header">
            <i class="bi bi-check-circle-fill me-2" style="color:#3fb950;"></i>
            Registration successful!
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            Your account has been created. You can now sign in below.
        </div>
    </div>
</div>


<!-- ════════════════════════════════════════
     FOOTER (minimal)
════════════════════════════════════════ -->
<footer class="py-3 text-center text-secondary small border-top border-secondary">
    &copy; 2026 FocusFlow. All rights reserved.
</footer>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
