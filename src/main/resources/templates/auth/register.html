<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - FocusFlowвЂњ FocusFlow</title>

    <!-- Bootstrap 5 -->
    <link th:href="@{/assets/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link th:href="@{/assets/css/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/assets/css/register-style.css}" rel="stylesheet">

</head>

<body>

<nav th:replace="~{fragments/navbar :: nav}"></nav>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Header -->
        <div class="text-center mb-4">
            <div class="auth-logo mb-2">
                <i class="bi bi-lightning-charge-fill text-warning"></i>
                Focus<span>Flow</span>
            </div>
            <h1 class="fs-4 fw-semibold mt-3 mb-1">Create your account</h1>
            <p class="text-secondary small mb-0">Start your first Pomodoro session in 60 seconds</p>
        </div>

        <!-- ГўвЂќв‚¬ГўвЂќв‚¬ REGISTER FORM ГўвЂќв‚¬ГўвЂќв‚¬
             Fields: fullName, username, email, password, confirmPassword
             POST /api/auth/register  (placeholder action)
        -->
        <form id="register-form" th:action="@{/auth/registers}" method="POST" th:object="${user}">

            <!-- Full Name -->
            <div class="mb-3">
                <label for="reg-fullname" class="form-label fw-medium">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary">
                      <i class="bi bi-person-badge"></i>
                    </span>
                    <input th:field="*{fullName}" type="text" class="form-control" id="reg-fullname" name="fullName" placeholder="Alice Nguyen" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>
            <!-- Email -->
            <div class="mb-3">
                <label for="reg-email" class="form-label fw-medium">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary">
                      <i class="bi bi-envelope"></i>
                    </span>
                    <input th:field="*{email}" type="email" class="form-control" id="reg-email" name="email" placeholder="you@example.com" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="reg-password" class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input th:field="*{password}" type="password" class="form-control" id="reg-password" name="password" placeholder="***********" required />
                    <!-- Toggle password visibility -->
                    <button class="btn btn-outline-secondary" type="button" id="toggle-reg-password"
                            onclick="togglePassword('reg-password', 'icon-reg-password')">
                        <i class="bi bi-eye" id="icon-reg-password"></i>
                    </button>
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label for="reg-confirm-password" class="form-label fw-medium">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary">
                      <i class="bi bi-lock-fill"></i>
                    </span>
                    <input th:field="*{confirmPassword}" type="password" class="form-control" id="reg-confirm-password" name="confirmPassword"
                           placeholder="***********" required />
                    <!-- Toggle confirm password visibility -->
                    <button class="btn btn-outline-secondary" type="button" id="toggle-reg-confirm-password"
                            onclick="togglePassword('reg-confirm-password', 'icon-reg-confirm-password')">
                        <i class="bi bi-eye" id="icon-reg-confirm-password"></i>
                    </button>
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <!-- Terms -->
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="terms" name="agreeTerms" required />
                <label class="form-check-label text-secondary small" for="terms">
                    I agree to the
                    <a href="#" class="text-decoration-none" style="color:#58a6ff;">Terms of Service</a>
                    and
                    <a href="#" class="text-decoration-none" style="color:#58a6ff;">Privacy Policy</a>
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" id="btn-register" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <!-- OR Divider -->
        <div class="or-divider">or</div>

        <!-- Sign up with Google
             Backend: GET /oauth2/authorization/google
             Same OAuth2 flow as login Гўв‚¬вЂќ Spring will auto-create account if email not found
        -->
        <a href="/oauth2/authorization/google" class="btn-google" id="btn-google-register">
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <path fill="#EA4335"
                      d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                      d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                      d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                      d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                <path fill="none" d="M0 0h48v48H0z" />
            </svg>
            Sign up with Google
        </a>

        <!-- Divider -->
        <hr class="divider" />

        <!-- Already have account -->
        <p class="text-center text-secondary small mb-0">
            Already have an account?
            <a th:href="@{/auth/login}" class="text-decoration-none" style="color:#58a6ff;">Sign in</a>
        </p>

    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    /**
     * Toggle password visibility and swap eye icon.
     * @param {string} inputId  - ID of the password <input>
     * @param {string} iconId   - ID of the <i> icon element
     */
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>

</html>
